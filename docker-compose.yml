# ═══════════════════════════════════════════════════════════════════════════════
#  🏥 Pharos-One - Docker Compose Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#  Professional PostgreSQL database setup for development and testing
# ═══════════════════════════════════════════════════════════════════════════════

name: 'pharos-one'

services:
  # ─────────────────────────────────────────────────────────────────────────────
  #  PostgreSQL Database with pgvector and pg_textsearch
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: pharos-one-postgres:latest
    container_name: pharos-one-db
    restart: unless-stopped
    
    environment:
      # Database credentials
      POSTGRES_DB: pharos_one
      POSTGRES_USER: pharos_one
      POSTGRES_PASSWORD: pharos_one_dev_password
      
      # PostgreSQL configuration
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      
      # Timezone
      TZ: UTC
      PGTZ: UTC
    
    ports:
      - "5432:5432"
    
    volumes:
      # Persistent data storage
      - postgres_data:/var/lib/postgresql
      
      # Custom PostgreSQL configuration
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      
      # Initialization scripts (run on first start)
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      
      # Backup directory
      - ./docker/postgres/backups:/backups
    
    command: 
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharos_one -d pharos_one"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    networks:
      - pharos-one-network
    
    labels:
      com.pharos-one.description: "PostgreSQL database for pharos-one"
      com.pharos-one.service: "database"

  # ─────────────────────────────────────────────────────────────────────────────
  #  Redis Cache (Optional - for future use)
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: pharos-one-redis
    restart: unless-stopped
    
    command: redis-server --appendonly yes --requirepass pharos-one_redis_password
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    
    networks:
      - pharos-one-network
    
    labels:
      com.pharos-one.description: "Redis cache for session and data caching"
      com.pharos-one.service: "cache"
    
    profiles:
      - cache

# ═══════════════════════════════════════════════════════════════════════════════
#  Volumes
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
    labels:
      com.pharos-one.description: "PostgreSQL data volume"
  
  pgadmin_data:
    driver: local
    labels:
      com.pharos-one.description: "pgAdmin configuration volume"
  
  # redis_data:
  #   driver: local
  #   labels:
  #     com.pharos-one.description: "Redis data volume"

# ═══════════════════════════════════════════════════════════════════════════════
#  Networks
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  pharos-one-network:
    driver: bridge
    labels:
      com.pharos-one.description: "Internal network for pharos-one services"
